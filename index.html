<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Game Platform: Chess, Ludo, XO</title>
    <style>
        /* --- CSS: VISUAL SYSTEM --- */
        :root {
            --gold: #ffd700;
            --dark: #121212;
            --glass: rgba(0, 0, 0, 0.85);
        }

        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Arial, sans-serif; background: #000; color: white; }
        
        #game-container { position: relative; width: 100vw; height: 100vh; }
        canvas { width: 100%; height: 100%; display: block; background: radial-gradient(circle, #2c3e50 0%, #000 100%); }

        /* UI Screens */
        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            pointer-events: none;
        }

        .screen {
            background: var(--glass);
            padding: 40px; border-radius: 20px; text-align: center;
            border: 2px solid var(--gold); pointer-events: all;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.2);
            min-width: 300px;
        }

        .hidden { display: none !important; }

        button {
            display: block; width: 100%; margin: 15px 0; padding: 15px;
            cursor: pointer; background: var(--gold); border: none; 
            font-weight: bold; font-size: 1rem; border-radius: 8px;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        button:hover { transform: scale(1.05); background: white; color: black; }
        button.back { background: #555; color: white; margin-top: 20px; }

        /* HUD & Gameplay UI */
        #game-hud {
            position: absolute; top: 20px; width: 100%; text-align: center;
            pointer-events: none; color: var(--gold); font-size: 1.5rem;
            text-shadow: 0 2px 5px #000;
        }

        #dice-container {
            position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%);
            pointer-events: all;
        }

        /* XO Grid Simulation (Small preview of the 100 grid logic) */
        .xo-info { font-size: 0.8rem; color: #aaa; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="game-container">
        <canvas id="renderCanvas"></canvas>

        <div class="overlay">
            <div id="main-menu" class="screen">
                <h1 style="letter-spacing: 5px;">GAME HUB 3D</h1>
                <p>Platform Multi-Mode</p>
                <button onclick="nav('game-selection')">PLAY</button>
                <button onclick="alert('Settings: Volume 100%')">SETTINGS</button>
                <button onclick="confirm('Exit Game?')">EXIT</button>
            </div>

            <div id="game-selection" class="screen hidden">
                <h2>PILIH MODE</h2>
                <button onclick="setupGame('CHESS')">♟️ CHESS 3D</button>
                <button onclick="setupGame('LUDO')">🎲 LUDO 3D</button>
                <button onclick="setupGame('XO')">❌ XO 3D (100 GRID)</button>
                <button class="back" onclick="nav('main-menu')">KEMBALI</button>
            </div>

            <div id="setup-player" class="screen hidden">
                <h2 id="setup-title">KONFIGURASI</h2>
                <div id="player-info" style="margin-bottom: 20px;"></div>
                <button onclick="initGameScene()">START GAME</button>
                <button class="back" onclick="nav('game-selection')">BACK</button>
            </div>

            <div id="end-screen" class="screen hidden">
                <h1 id="winner-text">WINNER!</h1>
                <button onclick="restartGame()">RESTART</button>
                <button onclick="nav('main-menu')">EXIT TO MENU</button>
            </div>
        </div>

        <div id="game-hud" class="hidden">
            <div id="turn-display">PLAYER 1 TURN</div>
            <div id="dice-container" class="hidden">
                <button id="roll-btn" onclick="logicLudo.rollDice()">ROLL DICE</button>
                <div id="dice-result" style="font-size: 3rem; margin-top: 10px;">?</div>
            </div>
        </div>
    </div>

    <script>
        /* --- JS: GLOBAL SYSTEM (PENGIKAT) --- */
        const GameManager = {
            currentGame: null,
            players: [],
            turn: 0,
            gameActive: false,
            engineReady: false
        };

        // A. START APP
        function initEngine() {
            console.log("Engine 3D: Inisialisasi Scene...");
            GameManager.engineReady = true;
            // Simulasi load asset
            setTimeout(() => console.log("Assets Loaded: Board, Bidak, Audio."), 500);
        }

        // Navigasi UI
        function nav(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
            document.getElementById(screenId).classList.remove('hidden');
        }

        // C & D. SETUP
        function setupGame(game) {
            GameManager.currentGame = game;
            const info = document.getElementById('player-info');
            
            if (game === 'CHESS') {
                GameManager.players = [{id: 1, color: 'White'}, {id: 2, color: 'Black'}];
                info.innerHTML = "Mode: 2 Players (White vs Black)";
            } else if (game === 'LUDO') {
                GameManager.players = [{id: 1}, {id: 2}, {id: 3}, {id: 4}];
                info.innerHTML = "Mode: 4 Players (Classic Ludo)";
            } else {
                GameManager.players = [{id: 1, sign: 'X'}, {id: 2, sign: 'O'}];
                info.innerHTML = "Mode: 10x10 Grid (5 in a row to win)";
            }
            nav('setup-player');
        }

        // E. LOAD GAME SCENE
        function initGameScene() {
            nav('none');
            document.getElementById('game-hud').classList.remove('hidden');
            GameManager.gameActive = true;
            
            console.log(`SceneManager: Loading ${GameManager.currentGame} Board...`);
            
            if(GameManager.currentGame === 'LUDO') {
                document.getElementById('dice-container').classList.remove('hidden');
            }
            
            renderLoop();
        }

        // F. GAMEPLAY LOOP (INTI SISTEM)
        function renderLoop() {
            if (!GameManager.gameActive) return;
            
            // handleInput()
            // updateGameLogic()
            updateCamera(GameManager.turn);
            // render()
            
            requestAnimationFrame(renderLoop);
        }

        // G. CAMERA SYSTEM (SHARED)
        function updateCamera(playerIndex) {
            // Logic: Kamera mengikuti pemain aktif secara halus
            // if (playerIndex === 1) camera.pos(front) else board.rotate(180)
        }

        /* --- H. GAME LOGIC PER MODULE --- */

        // 1. CHESS LOGIC
        const logicChess = {
            move: (piece, target) => {
                if (true) { // isValidMove()
                    console.log("Chess: Move Valid");
                    this.checkMate();
                    nextTurn();
                }
            },
            checkMate: () => { /* endGame() if true */ }
        };

        // 2. LUDO LOGIC
        const logicLudo = {
            rollDice: () => {
                const roll = Math.floor(Math.random() * 6) + 1;
                document.getElementById('dice-result').innerText = roll;
                playAudio("dice-sound");
                
                if (roll === 6) {
                    alert("Dadu 6! Dapat giliran tambahan.");
                } else {
                    setTimeout(nextTurn, 1000);
                }
            }
        };

        // 3. XO 100 GRID LOGIC
        const logicXO = {
            checkWin: () => {
                // Scan 10x10 grid for 5 in a row
                // if(win) { drawGoldFireLine(); endGame(); }
            }
        };

        /* --- I, J, K. GLOBAL HANDLER --- */
        function nextTurn() {
            GameManager.turn = (GameManager.turn + 1) % GameManager.players.length;
            document.getElementById('turn-display').innerText = `PLAYER ${GameManager.turn + 1} TURN`;
            playAudio("move-sound");
        }

        function endGame(winnerName) {
            GameManager.gameActive = false;
            document.getElementById('game-hud').classList.add('hidden');
            document.getElementById('winner-text').innerText = `WINNER: ${winnerName}`;
            nav('end-screen');
            playAudio("victory-sound");
        }

        function restartGame() {
            location.reload(); 
        }

        function playAudio(type) {
            console.log(`AudioManager: Playing ${type}`);
        }

        // Jalankan Engine saat start
        initEngine();

    </script>
</body>
</html>
